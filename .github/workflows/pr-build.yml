name: PR Test Build

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cleanup:
    name: Clean up test releases on PR close
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Delete all test releases for this PR
        run: |
          PR="${{ github.event.pull_request.number }}"
          gh release list --repo ${{ github.repository }} --limit 100 --json tagName \
            --jq ".[] | .tagName | select(startswith(\"pr-${PR}-test-\"))" \
            | while read -r tag; do
                gh release delete "$tag" --repo ${{ github.repository }} --yes 2>/dev/null || true
                gh api -X DELETE "repos/${{ github.repository }}/git/refs/tags/${tag}" 2>/dev/null || true
                echo "Deleted: $tag"
              done

  build:
    if: github.event.action != 'closed'
    name: Build test .deb for PR
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version and tag
        id: info
        run: |
          PR="${{ github.event.pull_request.number }}"
          SHA="${{ github.event.pull_request.head.sha }}"
          SHORT="${SHA:0:7}"

          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          [[ -z "$LATEST" ]] && LATEST="v0.0.0"
          BASE="${LATEST#v}"

          echo "pr=$PR"                              >> "$GITHUB_OUTPUT"
          echo "sha=$SHA"                            >> "$GITHUB_OUTPUT"
          echo "short=$SHORT"                        >> "$GITHUB_OUTPUT"
          echo "tag=pr-${PR}-test-${SHORT}"          >> "$GITHUB_OUTPUT"
          echo "version=${BASE}-pr.${PR}.${SHORT}"   >> "$GITHUB_OUTPUT"

      - name: Generate test plan (Claude AI)
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_MODEL:    ${{ secrets.ANTHROPIC_MODEL }}
        run: |
          COMMITS=$(git log "origin/main..HEAD" --oneline 2>/dev/null | head -20)
          CHANGED=$(git diff "origin/main...HEAD" --stat 2>/dev/null | tail -10)
          DIFF=$(git diff "origin/main...HEAD" -- scripts/ packaging/ systemd/ \
                 2>/dev/null | head -300)

          # Defaults — override via repo secrets for custom endpoints/models
          API_URL="${ANTHROPIC_BASE_URL:-https://api.anthropic.com}/v1/messages"
          MODEL="${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}"

          AI_CHECKLIST=""
          if [ -n "${ANTHROPIC_API_KEY:-}" ]; then
            PROMPT=$(printf '%s\n' \
              "You are a QA engineer for xfce-night-switch (XFCE desktop GTK theme switcher)." \
              "Given these git changes, generate 3-6 specific manual test items as a markdown checklist." \
              "Focus only on what changed -- be concrete (e.g. 'switch launcher to panel-0 via Settings, verify it moves')." \
              "Output ONLY the checklist lines starting with '- [ ]', nothing else." \
              "" \
              "Commits:" \
              "${COMMITS}" \
              "" \
              "Changed files:" \
              "${CHANGED}" \
              "" \
              "Diff (truncated):" \
              "${DIFF}")

            RESPONSE=$(curl -sf "$API_URL" \
              -H "anthropic-version: 2023-06-01" \
              -H "x-api-key: ${ANTHROPIC_API_KEY}" \
              -H "content-type: application/json" \
              -d "$(jq -n --arg p "$PROMPT" --arg m "$MODEL" \
                '{model:$m,max_tokens:400,messages:[{role:"user",content:$p}]}')" \
              2>/dev/null || true)

            AI_CHECKLIST=$(echo "$RESPONSE" | jq -r '.content[0].text' 2>/dev/null || true)
          fi

          # Fallback: derive checklist from changed files
          if [ -z "$AI_CHECKLIST" ]; then
            AI_CHECKLIST="- [ ] Panel icon visible after setup"
            echo "$CHANGED" | grep -q "install-panel-launcher" && \
              AI_CHECKLIST+=$'\n- [ ] Switch panel via Settings -> Panel launcher, verify it moves'
            echo "$CHANGED" | grep -q "auto-update" && \
              AI_CHECKLIST+=$'\n- [ ] Remove ~/.cache/xfce-night-switch/last-update-check, restart update service'
            echo "$CHANGED" | grep -q "auto-theme\|toggle-theme" && \
              AI_CHECKLIST+=$'\n- [ ] Click panel icon -- theme switches, icon updates'
            echo "$CHANGED" | grep -q "postinst\|setup" && \
              AI_CHECKLIST+=$'\n- [ ] Fresh install: setup runs once, no duplicate output'
          fi

          printf '%s\n' "$AI_CHECKLIST" > /tmp/test-checklist.txt
          echo "Test plan ($(wc -l < /tmp/test-checklist.txt) items):"
          cat /tmp/test-checklist.txt

      - name: Build .deb
        env:
          VERSION: ${{ steps.info.outputs.version }}
          PR_NUM:  ${{ steps.info.outputs.pr }}
        run: |
          PKG="xfce-night-switch_${VERSION}_all"
          SHARE="$PKG/usr/share/xfce-night-switch"
          APPS="$PKG/usr/share/applications"
          ICONS="$PKG/usr/share/icons/hicolor/scalable/apps"
          SYSTEMD="$PKG/usr/lib/systemd/user"

          mkdir -p "$SHARE/locales" "$APPS" "$ICONS" "$SYSTEMD" \
                   "$PKG/usr/bin" "$PKG/DEBIAN"

          install -m755 scripts/auto-theme.sh             "$SHARE/auto-theme.sh"
          install -m755 scripts/toggle-theme.sh           "$SHARE/toggle-theme.sh"
          install -m755 scripts/theme-settings.sh         "$SHARE/theme-settings.sh"
          install -m755 scripts/install-panel-launcher.sh "$SHARE/install-panel-launcher.sh"
          install -m755 scripts/sunrise-sunset.py         "$SHARE/sunrise-sunset.py"
          install -m755 scripts/auto-update.sh            "$SHARE/auto-update.sh"
          install -m644 packaging/config.default          "$SHARE/config.default"
          install -m644 locales/en.sh                     "$SHARE/locales/en.sh"
          install -m644 locales/ru.sh                     "$SHARE/locales/ru.sh"
          echo "$VERSION"  > "$SHARE/VERSION"
          echo "$PR_NUM"   > "$SHARE/PR_NUMBER"
          # Embed AI-generated test plan for installer checklist
          cp /tmp/test-checklist.txt "$SHARE/TEST_PLAN"

          for w in auto-theme theme-settings toggle-theme xfce-night-switch-setup auto-update; do
            install -m755 "packaging/bin/$w" "$PKG/usr/bin/$w"
          done

          install -m644 desktop/toggle-theme.desktop   "$APPS/toggle-theme.desktop"
          install -m644 desktop/theme-settings.desktop "$APPS/theme-settings.desktop"
          install -m644 icons/theme-moon.svg "$ICONS/theme-moon.svg"
          install -m644 systemd/xfce-night-switch-startup.service \
                        "$SYSTEMD/xfce-night-switch-startup.service"
          install -m644 systemd/xfce-night-switch-update.service \
                        "$SYSTEMD/xfce-night-switch-update.service"

          sed "s/__VERSION__/$VERSION/" packaging/DEBIAN/control.template > "$PKG/DEBIAN/control"
          install -m755 packaging/DEBIAN/postinst "$PKG/DEBIAN/postinst"
          install -m755 packaging/DEBIAN/postrm   "$PKG/DEBIAN/postrm"
          install -m755 packaging/DEBIAN/prerm    "$PKG/DEBIAN/prerm"

          dpkg-deb --build --root-owner-group "$PKG"
          echo "Built: ${PKG}.deb"

      - name: Create pre-release
        env:
          TAG:     ${{ steps.info.outputs.tag }}
          SHA:     ${{ steps.info.outputs.sha }}
          PR_NUM:  ${{ steps.info.outputs.pr }}
          SHORT:   ${{ steps.info.outputs.short }}
          VERSION: ${{ steps.info.outputs.version }}
        run: |
          gh release create "$TAG" \
            --prerelease \
            --target "$SHA" \
            --title "Test build -- PR #${PR_NUM} @ ${SHORT}" \
            --notes "Automated test build for PR #${PR_NUM} (commit \`${SHORT}\`). **Not for production use.**" \
            "xfce-night-switch_${VERSION}_all.deb"

      - name: Post/update PR comment
        env:
          PR_NUM:  ${{ steps.info.outputs.pr }}
          TAG:     ${{ steps.info.outputs.tag }}
          VERSION: ${{ steps.info.outputs.version }}
        run: |
          DEB_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/xfce-night-switch_${VERSION}_all.deb"
          TEST_ITEMS=$(cat /tmp/test-checklist.txt 2>/dev/null || echo "- [ ] Panel visible, toggle works, settings opens")

          {
            echo "<!-- xfce-night-switch-test-build -->"
            echo "## Test build ready -- PR #${PR_NUM}"
            echo ""
            echo "Install (Ubuntu/Debian/Mint):"
            echo '```bash'
            echo "wget -q '${DEB_URL}' -O /tmp/xns-test.deb \\"
            echo "  && sudo dpkg -i /tmp/xns-test.deb \\"
            echo "  && xfce-night-switch-setup"
            echo '```'
            echo ""
            echo "### Checklist"
            echo "${TEST_ITEMS}"
            echo "- [ ] No errors in \`journalctl --user -u xfce-night-switch-startup.service\`"
            echo ""
            echo "After verifying all items, confirm by commenting \`/test-passed\` -- PR will auto-merge."
          } > /tmp/pr-comment.md

          # Remove previous test-build comments
          gh api "repos/${{ github.repository }}/issues/${PR_NUM}/comments" \
            --jq '.[] | select(.body | startswith("<!-- xfce-night-switch-test-build -->")) | .id' \
            | xargs -I{} gh api -X DELETE \
              "repos/${{ github.repository }}/issues/comments/{}" 2>/dev/null || true

          gh pr comment "$PR_NUM" --body-file /tmp/pr-comment.md

      - name: Set pending test-gate check
        env:
          SHA: ${{ steps.info.outputs.sha }}
        run: |
          gh api "repos/${{ github.repository }}/statuses/${SHA}" \
            -f state=pending \
            -f context="test-gate" \
            -f description="Waiting for /test-passed on PR"
